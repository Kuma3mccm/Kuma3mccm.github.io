<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft 起動中...</title>
  <script>
    const query = new URLSearchParams(window.location.search);
    const encoded = query.get("c");

    if (encoded) {
      try {
        const decoded = atob(encoded);
        const [host, port] = decoded.split(":");
        const mcLink = `minecraft://connect/?serverUrl=${host}&serverPort=${port}`;
        window.location.href = mcLink;
      } catch (e) {
        document.write("<p>リンクの読み込みに失敗しました。</p>");
      }
    } else {
      document.write("<p>接続情報が見つかりません。</p>");
    }
  </script>
</head>
<body>
  <p>自動的に Minecraft が起動しない場合は、以下をクリックしてください：</p>
  <p><a id="manualLink" href="#">手動で接続</a></p>
  <script>
    if (encoded) {
      const decoded = atob(encoded);
      const [host, port] = decoded.split(":");
      const mcLink = `minecraft://connect/?serverUrl=${host}&serverPort=${port}`;
      document.getElementById("manualLink").href = mcLink;
    }
  </script>
</body>
</html>
