name: Deploy Minecraft Launcher

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必須！gh-pagesにPushするため

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build HTML file
        run: |
          ENCODED=$(echo "${{ secrets.MC_SERVER }}:${{ secrets.MC_PORT }}" | base64 | rev)
          mkdir output
          cat <<EOF > output/index.html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft 起動中...</title>
  <script>
    const encoded = "${ENCODED}";
    const reversed = encoded.split('').reverse().join('');
    const decoded = atob(reversed);
    const [host, port] = decoded.split(":");
    window.location.href = \`minecraft://connect/?serverUrl=\${host}&serverPort=\${port}\`;
  </script>
</head>
<body>
  <p>起動しない場合は手動で接続：</p>
  <a id="manualLink" href="#">手動リンク</a>
  <script>
    const reversed = "${ENCODED}".split('').reverse().join('');
    const decoded = atob(reversed);
    const [h, p] = decoded.split(":");
    document.getElementById("manualLink").href = \`minecraft://connect/?serverUrl=\${h}&serverPort=\${p}\`;
  </script>
</body>
</html>
EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
